<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tallyr — Join</title>
    <meta http-equiv="refresh" content="0;url=https://app.tallyr.com.au/join" />
    <script>
      (function () {
        var APP_JOIN = 'https://app.tallyr.com.au/join';
        var url = new URL(window.location.href);
        var token = url.searchParams.get('t');
        if (!token) {
          var parts = url.pathname.split('/').filter(Boolean);
          var joinIdx = parts.indexOf('join');
          if (joinIdx >= 0 && parts[joinIdx + 1]) token = parts[joinIdx + 1];
        }
        var target = new URL(APP_JOIN);
        if (token) target.searchParams.set('t', token);
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to Tallyr… <a href="https://app.tallyr.com.au/join">Continue</a></p>
  </body>
</html>
