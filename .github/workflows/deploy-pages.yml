# Deploy this folder to GitHub Pages (use this repo = site root; path is ".")
# Repo settings → Pages → Build: GitHub Actions (first push may require approval).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate public config (Supabase anon)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p assets
          python3 - <<'PY'
          import os

          supabase_url = os.environ.get("SUPABASE_URL", "").strip()
          supabase_anon_key = os.environ.get("SUPABASE_ANON_KEY", "").strip()

          if not supabase_url or not supabase_anon_key:
            print("Missing SUPABASE_URL or SUPABASE_ANON_KEY secrets.")
            print("Generating placeholder assets/config.js (site will show setup required).")
            supabase_url = ""
            supabase_anon_key = ""

          content = (
            "window.TALLYR_PUBLIC_CONFIG = {\n"
            f"  SUPABASE_URL: {supabase_url!r},\n"
            f"  SUPABASE_ANON_KEY: {supabase_anon_key!r},\n"
            "};\n"
          )

          with open("assets/config.js", "w", encoding="utf-8") as f:
            f.write(content)
          PY

      - name: Collect site (exclude .github from published files)
        run: |
          mkdir -p out
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='out/' \
            --exclude='README.md' \
            --exclude='README.MD' \
            ./ out/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
